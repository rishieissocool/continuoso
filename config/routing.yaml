# Model routing. Each tier lists models in preferred order.
# `tier_order` controls walk order when a task fails over: Claude Code CLI first
# (uses your local `claude` install + Claude Code usage), then OpenRouter, then Ollama.
# Override per project in `.continuoso/routing.yaml`.

tier_order: [heavy, free, cheap, local]

success_threshold: 0.8
# How many models to try per subtask (iter_selections stops after this many).
escalation_attempts: 12

tiers:
  # Local — Ollama (default). Set OLLAMA_MODEL / pull a tag, e.g. `ollama pull qwen2.5:7b`
  local:
    provider: ollama
    models:
      - id: "qwen2.5:7b"
        context: 32000

  # Free tier — OpenRouter free models (when local fails or you escalate).
  free:
    provider: openrouter
    models:
      - id: "openai/gpt-oss-120b:free"
        context: 131000
      - id: "nvidia/nemotron-3-super-120b-a12b:free"
        context: 262000
      - id: "openrouter/elephant:free"
        context: 262000
      - id: "google/gemma-4-31b-it:free"
        context: 262000
      - id: "minimax/minimax-m2.5:free"
        context: 197000
      - id: "meta-llama/llama-3.3-70b-instruct:free"
        context: 66000

  # Cheap paid — reliable, low cost.
  cheap:
    provider: openrouter
    models:
      - id: "google/gemini-2.5-flash"
        context: 1000000
      - id: "deepseek/deepseek-r1-0528"
        context: 163000
      - id: "openai/gpt-4o-mini"
        context: 128000
      - id: "anthropic/claude-haiku-4.5"
        context: 200000

  # Heavy — prefer Claude Code CLI. If CLI missing, OpenRouter free models.
  heavy:
    provider: claude_code
    models:
      - id: "claude-sonnet-4-6"
        context: 1000000
      - id: "claude-opus-4-6"
        context: 1000000
    fallback:
      provider: openrouter
      models:
        - id: "openai/gpt-oss-120b:free"
          context: 131000
        - id: "nvidia/nemotron-3-super-120b-a12b:free"
          context: 262000
        - id: "openrouter/elephant:free"
          context: 262000
        - id: "google/gemma-4-31b-it:free"
          context: 262000
        - id: "minimax/minimax-m2.5:free"
          context: 197000
        - id: "meta-llama/llama-3.3-70b-instruct:free"
          context: 66000

# Default tier per task — `heavy` tries Claude Code CLI first, then falls through tiers.
task_class_defaults:
  observe_summary: heavy
  reflect_gaps: heavy
  plan_iteration: heavy
  decompose_task: heavy
  edit_single_file: heavy
  edit_cross_file: heavy
  author_tests: heavy
  fix_failing_tests: heavy
  refactor: heavy
  generate_docs: heavy
  commit_message: heavy
  lint_fix: heavy
  dependency_bump: heavy
  security_review: heavy
