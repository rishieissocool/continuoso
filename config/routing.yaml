# Model routing. Each tier lists models in preferred order.
# Default tier is `local` (Ollama). Override in .continuoso/routing.yaml per project.

success_threshold: 0.8
# How many models to try per subtask (iter_selections stops after this many).
escalation_attempts: 12

tiers:
  # Local — Ollama (default). Set OLLAMA_MODEL / pull a tag, e.g. `ollama pull qwen2.5:7b`
  local:
    provider: ollama
    models:
      - id: "qwen2.5:7b"
        context: 32000

  # Free tier — OpenRouter free models (when local fails or you escalate).
  free:
    provider: openrouter
    models:
      - id: "openai/gpt-oss-120b:free"
        context: 131000
      - id: "nvidia/nemotron-3-super-120b-a12b:free"
        context: 262000
      - id: "openrouter/elephant:free"
        context: 262000
      - id: "google/gemma-4-31b-it:free"
        context: 262000
      - id: "minimax/minimax-m2.5:free"
        context: 197000
      - id: "meta-llama/llama-3.3-70b-instruct:free"
        context: 66000

  # Cheap paid — reliable, low cost.
  cheap:
    provider: openrouter
    models:
      - id: "google/gemini-2.5-flash"
        context: 1000000
      - id: "deepseek/deepseek-r1-0528"
        context: 163000
      - id: "openai/gpt-4o-mini"
        context: 128000
      - id: "anthropic/claude-haiku-4.5"
        context: 200000

  # Heavy — prefer Claude Code CLI. If CLI missing, OpenRouter free models.
  heavy:
    provider: claude_code
    models:
      - id: "claude-sonnet-4-6"
        context: 1000000
      - id: "claude-opus-4-6"
        context: 1000000
    fallback:
      provider: openrouter
      models:
        - id: "openai/gpt-oss-120b:free"
          context: 131000
        - id: "nvidia/nemotron-3-super-120b-a12b:free"
          context: 262000
        - id: "openrouter/elephant:free"
          context: 262000
        - id: "google/gemma-4-31b-it:free"
          context: 262000
        - id: "minimax/minimax-m2.5:free"
          context: 197000
        - id: "meta-llama/llama-3.3-70b-instruct:free"
          context: 66000

# Default tier per task — `local` first; router walks toward free/cheap/heavy on failure.
task_class_defaults:
  observe_summary: local
  reflect_gaps: local
  plan_iteration: local
  decompose_task: local
  edit_single_file: local
  edit_cross_file: local
  author_tests: local
  fix_failing_tests: local
  refactor: local
  generate_docs: local
  commit_message: local
  lint_fix: local
  dependency_bump: local
  security_review: local
