# Edit this file to steer the autonomous loop.
# The Planner scores gaps against these goals every iteration.

product:
  name: "target-app"
  vision: >
    Continuously improve this codebase: keep tests green, raise quality
    (correctness, clarity, maintainability), and polish UX and docs until
    further gains are marginal. Each merged iteration should be objectively
    better than the last.

# Higher weight = more important when ranking gaps.
priorities:
  - id: tests-and-correctness
    weight: 1.0
    description: "All automated tests pass; fix regressions immediately; add tests for fragile or critical behavior."
  - id: product-quality
    weight: 0.85
    description: "Features and UX match the product vision; remove rough edges and inconsistencies."
  - id: structure-and-docs
    weight: 0.65
    description: "Clear structure, README, and in-code documentation where it prevents mistakes."
  - id: performance-and-a11y
    weight: 0.5
    description: "Reasonable performance and accessibility for the stack (where applicable)."

non_goals:
  - "Rewriting the stack without strong justification"
  - "Large unrelated refactors in a single iteration"

# Hard requirements. Evaluator treats these as invariants.
invariants:
  - "No change may break existing passing tests."
  - "No files may exceed 500 LOC."

# Language / stack hints — helps the Planner generate realistic plans.
stack:
  language: python
  package_manager: pip
  test_runner: pytest
  lint: ruff
  formatter: ruff
